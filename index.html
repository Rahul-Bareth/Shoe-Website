<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoe Website</title>
  <link rel="stylesheet" href="style.css">
</head>
   <body>
     <main>
     <section class="image-section">
       <aside>
        <img src="images/side_image1.png" alt="images">
        <img src="images/side_image2.png" alt="images">
        <img src="images/side_image3.png" alt="images">
        <img src="images/side_image4.png" alt="images">
        <img src="images/side_image5.png" alt="images">

       </aside>

      <section class="image-container">
        <a href="https://www.ajio.com/nike-revolution-8-running-shoes/p/469763462_green" target="_blank">
        <img src="images/center_image.png" alt="center-image">
        <img class="center-img" src="images/center-image2.png" alt="ceneterimg2">
        <img src="images/center-image3.png" alt="centerimg3">
        </a>
      </section>

     </section>

     <section class="content">
      <div class="content-header">
      <P class="green-text">
       Sustainable Materials
      </P>
      <h1>Nike Revolution 8</h1>
      <h4>Men's Road Running Shoes</h4>
      </div>

      <section class="price-section">
        <h2>MRP - $0.00 </h2>
        <div>
          <p>Inclusive of all taxes</p>
          <p>Also include all applicable duties</p>
        </div>
      </section>

      <section class="variants-section">
        <img src="images/variant1.png" alt="variant">
        <img src="images/variant2.png" alt="variant">
        <img src="images/variant3.png" alt="variant">
        <img src="images/variant4.png" alt="variant"> 
      </section>
     

      <section class="size-section">
      <div class="size-header">
        <h4>Select Size</h4>
        <h4>Size Guide</h4>
      </div>
      </section>


      <section class="sizes">
        <div class="size">UK 6</div>
        <div class="size">UK 6.5</div>
        <div class="size">UK 7</div>
        <div class="size">UK 8</div>
      </section>

      <section class="button-container">
        <button class="add-to-btn">Add to Bag</button>
        <button class="wishlist">Wishlist</button>
      </section>

      </section>
    </main> 
  </body>
</html>
